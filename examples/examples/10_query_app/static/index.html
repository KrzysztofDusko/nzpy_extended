<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nzpy_extended — Query Test App</title>
    <style>
        :root {
            --bg: #1e1e1e;
            --panel-bg: #252526;
            --border: #3c3c3c;
            --text: #cccccc;
            --accent: #0078d4;
            --error: #f44747;
            --success: #4ec9b0;
            --warning: #dcdcaa;
            --row-hover: #2a2d2e;
            --toolbar-bg: #323233;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Toolbar ── */
        #toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            flex-wrap: wrap;
            min-height: 40px;
        }

        #toolbar button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
        }
        #toolbar button:hover { filter: brightness(1.15); }
        #toolbar button:disabled { opacity: 0.5; cursor: default; filter: none; }
        #toolbar button.danger { background: var(--error); }
        #toolbar button.secondary { background: #4d4d4d; }

        #toolbar label {
            font-size: 12px;
            color: var(--text);
            white-space: nowrap;
        }

        #toolbar input[type="number"] {
            width: 60px;
            padding: 3px 6px;
            background: #3c3c3c;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 13px;
        }

        #toolbar .separator {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 4px;
        }

        #toolbar .spacer { flex: 1; }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .status-dot.idle { background: #555; }
        .status-dot.running { background: var(--accent); animation: pulse 1s infinite; }
        .status-dot.error { background: var(--error); }
        .status-dot.success { background: var(--success); }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #status-text {
            font-size: 12px;
            white-space: nowrap;
        }

        /* ── Editor ── */
        #editor-container {
            flex: 0 0 200px;
            min-height: 100px;
            border-bottom: 1px solid var(--border);
            resize: vertical;
            overflow: hidden;
        }

        /* ── Results ── */
        #results-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 12px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            flex-shrink: 0;
        }

        #results-count {
            color: var(--text);
        }

        #results-error {
            padding: 16px;
            color: var(--error);
            font-size: 13px;
            white-space: pre-wrap;
        }

        #table-scroll-container {
            flex: 1;
            overflow: auto;
            position: relative;
        }

        .cell-null { color: #666; font-style: italic; }

        /* ── Import dialog ── */
        #import-dialog {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        #import-dialog.open { display: flex; }

        #import-dialog .dialog-box {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 20px;
            min-width: 400px;
        }

        #import-dialog h3 {
            margin-bottom: 12px;
            font-size: 15px;
        }

        #import-dialog label {
            display: block;
            margin: 8px 0 4px;
            font-size: 13px;
        }

        #import-dialog input[type="text"],
        #import-dialog input[type="file"] {
            width: 100%;
            padding: 6px;
            background: #3c3c3c;
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 3px;
            font-size: 13px;
        }

        #import-dialog .dialog-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 16px;
        }

        #import-dialog button {
            padding: 5px 16px;
            border-radius: 3px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }
        #import-dialog button.primary { background: var(--accent); color: white; }
        #import-dialog button.secondary { background: #4d4d4d; color: white; }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 16px;
            right: 16px;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 4px;
            font-size: 13px;
            z-index: 200;
            max-width: 400px;
            display: none;
        }
        #toast.show { display: block; }
        #toast.error { border-color: var(--error); color: var(--error); }
        #toast.success { border-color: var(--success); color: var(--success); }

        /* ── Loading overlay ── */
        #loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.3);
            z-index: 10;
            align-items: center;
            justify-content: center;
        }
        #loading-overlay.active { display: flex; }
    </style>
</head>
<body>

<!-- ═══════════════ TOOLBAR ═══════════════ -->
<div id="toolbar">
    <button id="btn-run" onclick="runQuery()" title="Run SQL (Ctrl+Enter)">▶ Run</button>
    <button id="btn-cancel" class="danger" onclick="cancelQuery()" disabled title="Cancel running query">■ Cancel</button>
    <span class="separator"></span>
    <label>Timeout (s):</label>
    <input id="timeout-input" type="number" value="30" min="0" step="1">
    <button id="btn-export" class="secondary" onclick="exportResults()" title="Export results">📥 Export</button>
    <button id="btn-import" class="secondary" onclick="openImport()" title="Import CSV">📤 Import</button>
    <span class="separator"></span>
    <button id="btn-tables" class="secondary" onclick="loadTables()" title="Refresh table list">📋 Tables</button>
    <div class="spacer"></div>
    <span id="status-dot" class="status-dot idle"></span>
    <span id="status-text">Ready</span>
</div>

<!-- ═══════════════ MONACO EDITOR ═══════════════ -->
<div id="editor-container"></div>

<!-- ═══════════════ RESULTS ═══════════════ -->
<div id="results-container">
    <div id="results-header">
        <span id="results-count">No results</span>
    </div>
    <div id="results-error" style="display:none"></div>
    <div id="table-scroll-container"></div>
    <div id="loading-overlay"></div>
</div>

<!-- ═══════════════ IMPORT DIALOG ═══════════════ -->
<div id="import-dialog">
    <div class="dialog-box">
        <h3>Import CSV</h3>
        <label>Target table name:</label>
        <input id="import-table" type="text" placeholder="my_table">
        <label>CSV file:</label>
        <input id="import-file" type="file" accept=".csv,.txt,.tsv">
        <label>Delimiter:</label>
        <input id="import-delimiter" type="text" value="," maxlength="1">
        <div class="dialog-actions">
            <button class="secondary" onclick="closeImport()">Cancel</button>
            <button class="primary" onclick="doImport()">Import</button>
        </div>
    </div>
</div>

<!-- ═══════════════ TOAST ═══════════════ -->
<div id="toast"></div>

<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script type="module">

    const QUERY_ENDPOINT = "/api/query";
    const CANCEL_ENDPOINT = "/api/cancel";
    const EXPORT_ENDPOINT = "/api/export";
    const IMPORT_ENDPOINT = "/api/import";
    const TABLES_ENDPOINT = "/api/tables";

    // ── UI helpers ──
    window.setStatus = (state, text) => {
        document.getElementById("status-dot").className = "status-dot " + state;
        document.getElementById("status-text").textContent = text;
    };

    window.setButtonsEnabled = (running) => {
        document.getElementById("btn-run").disabled = running;
        document.getElementById("btn-cancel").disabled = !running;
    };

    window.showToast = (msg, type = "") => {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.className = type;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 4000);
    };

    window.showError = (msg) => {
        document.getElementById("results-error").textContent = msg;
        document.getElementById("results-error").style.display = "block";
    };

    window.hideError = () => {
        document.getElementById("results-error").style.display = "none";
    };

    // ── Virtualized table state & renderer ──
    let _activeQueryId = null;
    let _tableData = { columns: [], rows: [] };
    let _columnWidths = [];
    let _spacerEl = null;
    const ROW_H = 34;
    const OVERSCAN = 15;

    function formatCell(v) {
        if (v === null || v === undefined) return "\u00A0";
        if (typeof v === "boolean") return v ? "true" : "false";
        return String(v);
    }

    function formatCellNull(v) {
        if (v === null || v === undefined)
            return '<span class="cell-null">NULL</span>';
        return formatCell(v);
    }

    function buildColumnHeader(colNames) {
        _columnWidths = colNames.map((name) =>
            Math.max(130, Math.min(name.length * 10 + 40, 300))
        );
        const totalWidth = _columnWidths.reduce((a, b) => a + b, 0);

        const row = document.createElement("div");
        row.style.cssText = "display:flex;position:sticky;top:0;z-index:2;min-width:" + totalWidth + "px;";

        colNames.forEach((name, i) => {
            const cell = document.createElement("div");
            cell.textContent = name;
            cell.style.cssText =
                "padding:6px 12px;font-weight:600;font-size:12px;color:#0078d4;" +
                "background:#323233;border-bottom:2px solid #3c3c3c;" +
                "border-right:1px solid #3c3c3c;white-space:nowrap;overflow:hidden;" +
                "text-overflow:ellipsis;flex-shrink:0;";
            cell.style.width = _columnWidths[i] + "px";
            cell.style.minWidth = _columnWidths[i] + "px";
            row.appendChild(cell);
        });
        return row;
    }

    function renderVirtualRows() {
        if (!_spacerEl || !_tableData) return;

        const container = document.getElementById("table-scroll-container");
        if (!container) return;

        const scrollTop = container.scrollTop;
        const viewH = container.clientHeight;
        const total = _tableData.rows.length;
        const totalH = total * ROW_H;

        const start = Math.max(0, Math.floor(scrollTop / ROW_H) - OVERSCAN);
        const end = Math.min(total - 1, Math.ceil((scrollTop + viewH) / ROW_H) + OVERSCAN);

        while (_spacerEl.lastChild) _spacerEl.removeChild(_spacerEl.lastChild);

        _spacerEl.style.height = totalH + "px";

        const cols = _tableData.columns;

        for (let i = start; i <= end; i++) {
            const rowData = _tableData.rows[i];
            const el = document.createElement("div");
            Object.assign(el.style, {
                position: "absolute",
                top: "0",
                left: "0",
                width: "100%",
                height: ROW_H + "px",
                transform: "translateY(" + (i * ROW_H) + "px)",
                display: "flex",
            });

            for (let j = 0; j < cols.length; j++) {
                const cell = document.createElement("div");
                cell.style.cssText =
                    "padding:4px 12px;font-size:12px;border-bottom:1px solid #3c3c3c;" +
                    "border-right:1px solid #3c3c3c;white-space:nowrap;overflow:hidden;" +
                    "text-overflow:ellipsis;flex-shrink:0;";
                cell.style.width = _columnWidths[j] + "px";
                cell.style.minWidth = _columnWidths[j] + "px";
                cell.innerHTML = formatCellNull(rowData[j]);
                el.appendChild(cell);
            }
            _spacerEl.appendChild(el);
        }
    }

    function initTable(data) {
        _tableData = data;

        const container = document.getElementById("table-scroll-container");
        container.innerHTML = "";

        const colNames = data.columns.map((c) =>
            c.ColumnName || c.name || c.column_name || "?"
        );
        const header = buildColumnHeader(colNames);
        container.appendChild(header);

        _spacerEl = document.createElement("div");
        Object.assign(_spacerEl.style, {
            position: "relative",
            width: "100%",
            minWidth: _columnWidths.reduce((a, b) => a + b, 0) + "px",
        });
        container.appendChild(_spacerEl);

        container.addEventListener("scroll", () => renderVirtualRows(), { passive: true });

        renderVirtualRows();
    }

    window.updateTable = (columns, rows) => {
        const data = { columns: columns || [], rows: rows || [] };
        _tableData = data;

        document.getElementById("results-count").textContent =
            rows.length + " row" + (rows.length !== 1 ? "s" : "");
        document.getElementById("results-error").style.display = "none";
        window.setButtonsEnabled(false);
        window.setStatus("success", "Done \u2014 " + rows.length + " rows");

        if (rows.length === 0) {
            document.getElementById("table-scroll-container").innerHTML = "";
            return;
        }

        initTable(data);
    };

    // ── Query execution (called from toolbar) ──
    window.runQuery = async () => {
        const editor = window._monacoEditor;
        if (!editor) return;
        const sql = editor.getValue().trim();
        if (!sql) return;

        const timeoutVal = parseFloat(document.getElementById("timeout-input").value) || 0;
        const queryId = crypto.randomUUID();
        _activeQueryId = queryId;

        hideError();
        window.setButtonsEnabled(true);
        window.setStatus("running", "Executing...");

        const loading = document.getElementById("loading-overlay");
        loading.classList.add("active");

        const formData = new FormData();
        formData.append("sql", sql);
        formData.append("timeout", timeoutVal > 0 ? String(timeoutVal) : "");
        formData.append("query_id", queryId);

        try {
            const resp = await fetch(QUERY_ENDPOINT, { method: "POST", body: formData });
            const text = await resp.text();
            let json;
            try {
                json = JSON.parse(text);
            } catch {
                showError(text || `HTTP ${resp.status} — non-JSON response`);
                window.setStatus("error", "Query failed");
                window.setButtonsEnabled(false);
                loading.classList.remove("active");
                return;
            }

            if (!resp.ok) {
                window.showToast("Error", "error");
                showError(json.detail || `HTTP ${resp.status}`);
                window.setStatus("error", "Query failed");
                window.setButtonsEnabled(false);
                loading.classList.remove("active");
                return;
            }

            if (json.truncated && json.message) {
                window.showToast(json.message, "success");
            }

            window.updateTable(json.columns || [], json.rows || []);
        } catch (err) {
            showError(err.message || "Network error");
            window.setStatus("error", "Connection failed");
            window.setButtonsEnabled(false);
        } finally {
            loading.classList.remove("active");
        }
    };

    // ── Cancel ──
    window.cancelQuery = async () => {
        const qid = _activeQueryId;
        if (!qid) return;

        const formData = new FormData();
        formData.append("query_id", qid);

        try {
            const resp = await fetch(CANCEL_ENDPOINT, { method: "POST", body: formData });
            const json = await resp.json();
            window.showToast("Cancel signal sent", "success");
            window.setStatus("idle", "Cancelling...");
        } catch (err) {
            window.showToast("Cancel failed: " + err.message, "error");
        }
    };

    // ── Export ──
    window.exportResults = async () => {
        const editor = window._monacoEditor;
        if (!editor) return;
        const sql = editor.getValue().trim();
        if (!sql) return;

        const formData = new FormData();
        formData.append("sql", sql);
        formData.append("format", "csv");

        try {
            const resp = await fetch(EXPORT_ENDPOINT, { method: "POST", body: formData });
            if (!resp.ok) {
                const json = await resp.json();
                window.showToast("Export failed: " + (json.detail || resp.status), "error");
                return;
            }
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "export.csv";
            a.click();
            URL.revokeObjectURL(url);
            window.showToast("Exported successfully", "success");
        } catch (err) {
            window.showToast("Export failed: " + err.message, "error");
        }
    };

    // ── Import dialog ──
    window.openImport = () => {
        document.getElementById("import-dialog").classList.add("open");
    };

    window.closeImport = () => {
        document.getElementById("import-dialog").classList.remove("open");
    };

    window.doImport = async () => {
        const table = document.getElementById("import-table").value.trim();
        const fileInput = document.getElementById("import-file");
        const delimiter = document.getElementById("import-delimiter").value || ",";
        const file = fileInput.files[0];

        if (!table || !file) {
            window.showToast("Table name and file required", "error");
            return;
        }

        const formData = new FormData();
        formData.append("table", table);
        formData.append("file", file);
        formData.append("delimiter", delimiter);

        try {
            const resp = await fetch(IMPORT_ENDPOINT, { method: "POST", body: formData });
            const json = await resp.json();

            if (resp.ok) {
                window.showToast(`Imported ${json.imported} rows into "${json.table}"`, "success");
                window.closeImport();
            } else {
                window.showToast("Import failed: " + (json.detail || resp.status), "error");
            }
        } catch (err) {
            window.showToast("Import error: " + err.message, "error");
        }
    };

    // ── Load tables ──
    window.loadTables = async () => {
        try {
            const resp = await fetch(TABLES_ENDPOINT);
            const json = await resp.json();
            const editor = window._monacoEditor;
            if (editor) {
                const tables = json.tables || [];
                const value = editor.getValue();
                const prefix = value.trim()
                    ? "-- Available tables:\n-- " + tables.slice(0, 30).join(", ") +
                      (tables.length > 30 ? " ... (and " + (tables.length - 30) + " more)" : "") + "\n" + value
                    : "-- Available tables:\n-- " + tables.slice(0, 30).join(", ") +
                      (tables.length > 30 ? " ... (and " + (tables.length - 30) + " more)" : "") + "\n";
                editor.setValue(prefix);
            }
            window.showToast(`Loaded ${json.tables?.length || 0} tables`, "success");
        } catch (err) {
            window.showToast("Failed to load tables: " + err.message, "error");
        }
    };

    // ── Keyboard shortcut: Ctrl+Enter to run ──
    document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
            e.preventDefault();
            window.runQuery();
        }
    });
</script>

<!-- ═══════════════ MONACO EDITOR (AMD loader) ═══════════════ -->
<script>
    var require = {
        paths: {
            vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs"
        }
    };
</script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
<script>
    require(["vs/editor/editor.main"], function () {
        monaco.languages.registerCompletionItemProvider("sql", {
            provideCompletionItems: function () {
                const keywords = [
                    "SELECT", "FROM", "WHERE", "AND", "OR", "NOT", "IN", "IS", "NULL",
                    "LEFT JOIN", "RIGHT JOIN", "INNER JOIN", "FULL JOIN", "ON",
                    "GROUP BY", "ORDER BY", "HAVING", "LIMIT", "OFFSET",
                    "INSERT INTO", "VALUES", "UPDATE", "SET", "DELETE FROM",
                    "CREATE TABLE", "ALTER TABLE", "DROP TABLE", "CREATE INDEX",
                    "COUNT", "SUM", "AVG", "MIN", "MAX", "COALESCE", "CAST",
                    "CASE", "WHEN", "THEN", "ELSE", "END",
                    "AS", "DISTINCT", "UNION", "ALL", "EXISTS", "BETWEEN",
                    "LIKE", "ILIKE", "ASC", "DESC", "TRUE", "FALSE",
                    "INT", "BIGINT", "VARCHAR", "NVARCHAR", "BOOLEAN", "FLOAT",
                    "DOUBLE", "DECIMAL", "DATE", "TIME", "TIMESTAMP", "INTERVAL",
                    "DISTRIBUTE ON", "RANDOM", "TEMPORARY", "TEMP",
                    "GROOM TABLE", "GENERATE STATISTICS",
                ];
                return {
                    suggestions: keywords.map(k => ({
                        label: k,
                        kind: monaco.languages.CompletionItemKind.Keyword,
                        insertText: k,
                        range: null,
                    })),
                };
            },
        });

        monaco.languages.setLanguageConfiguration("sql", {
            brackets: [["(", ")"]],
            autoClosingPairs: [
                { open: "(", close: ")" },
                { open: "'", close: "'" },
                { open: '"', close: '"' },
            ],
            surroundingPairs: [
                { open: "(", close: ")" },
                { open: "'", close: "'" },
                { open: '"', close: '"' },
            ],
        });

        const editor = monaco.editor.create(document.getElementById("editor-container"), {
            value: "-- SELECT 1 AS col1, 'hello' AS col2, 3.14 AS col3\nSELECT * FROM _v_table WHERE objtype='TABLE' LIMIT 50",
            language: "sql",
            theme: "vs-dark",
            fontSize: 14,
            fontFamily: "'Cascadia Code', 'Fira Code', 'Consolas', monospace",
            lineNumbers: "on",
            minimap: { enabled: false },
            scrollBeyondLastLine: false,
            automaticLayout: true,
            wordWrap: "on",
            tabSize: 2,
            renderWhitespace: "selection",
            bracketPairColorization: { enabled: true },
        });

        window._monacoEditor = editor;

        editor.addCommand(
            monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,
            () => window.runQuery()
        );

        window.addEventListener("resize", () => editor.layout());
    });
</script>

</body>
</html>
