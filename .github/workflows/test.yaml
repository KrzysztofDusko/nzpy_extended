name: Test

# CI runs without a live Netezza instance: unit tests, type checks, and import smoke only.
# Integration tests (markers smoke/full) require NZ_DEV_* env vars and must be run locally.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run unit tests
        run: |
          pytest tests/test_paramstyle.py \
            tests/test_typeobjects.py \
            tests/test_regressions_unit.py \
            tests/test_c_python_parity_unit.py \
            tests/test_buffer_pool.py \
            tests/test_buffered_stream.py \
            tests/test_csv_import_unit.py \
            tests/test_pool_unit.py \
            tests/test_extended_query_benchmark.py \
            -v --tb=short

  lint:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[lint]"

      - name: mypy
        run: mypy nzpy_extended

      - name: pyright
        run: pyright nzpy_extended

  import-smoke:
    name: Build and import smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build and install wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          pip install dist/*.whl

      - name: Import smoke
        run: |
          python -c "
          import nzpy_extended
          from nzpy_extended import _HAVE_C_EXT
          print('version:', nzpy_extended.__version__)
          print('C extension:', _HAVE_C_EXT)
          assert nzpy_extended.__version__ != '0+unknown'
          "

      - name: Build and install sdist
        run: |
          python -m build --sdist
          pip install --force-reinstall dist/*.tar.gz

      - name: Import smoke (sdist)
        run: |
          python -c "
          import nzpy_extended
          assert nzpy_extended.__version__ != '0+unknown'
          "
